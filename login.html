                    </svg> м№ҙм№ҙмҳӨлЎң мӢңмһ‘н•ҳкё°
                </button>
                <button onclick="mockSocialLogin('л„ӨмқҙлІ„')" class="w-full flex items-center justify-center bg-[#03C75A] text-white py-3 rounded-xl hover:bg-[#02b350] transition font-medium" id="naverIdLogin_loginButton">

                <div class="flex-grow border-t border-gray-200"></div>

            <form class="space-y-4" onsubmit="handleEmailLogin(event)">

    <script type="module">
        import { loadComponent } from './ui.js';
        
        // н—ӨлҚ”мҷҖ н‘ён„° лЎңл“ң
        window.addEventListener('DOMContentLoaded', () => {
            loadComponent('header-placeholder', 'header.html');
            loadComponent('footer-placeholder', 'footer.html');
        });
    </script>

    <script>
        // рҹ’Ў [н•өмӢ¬ м—°лҸҷ] MVPмҡ© к°Җм§ң(Mock) лЎңк·ёмқё м„ұкіө мІҳлҰ¬ н•ЁмҲҳ
        function processLoginSuccess() {
            // н—ӨлҚ” UI м—°лҸҷмқ„ мң„н•ң м „м—ӯ мғҒнғң м ҖмһҘ
            localStorage.setItem('isLoggedIn', 'true');
            if (!localStorage.getItem('managerName')) localStorage.setItem('managerName', 'мҳҒм„қ'); 
            if (!localStorage.getItem('userTier')) localStorage.setItem('userTier', 'Pro'); 
            
            // лҢҖмӢңліҙл“ңлЎң мқҙлҸҷ
            location.href = 'dashboard.html';
        }

        // мқҙл©”мқј лЎңк·ёмқё нҸј м ңм¶ң мІҳлҰ¬
        function handleEmailLogin(event) {
            event.preventDefault();
            alert('мқҙл©”мқј лЎңк·ёмқёмқҙ м„ұкіөн–ҲмҠөлӢҲлӢӨ!');
            processLoginSuccess();
        }

        // рҹ’Ў [м¶”к°Җ] MVPмҡ© мҶҢм…ң лЎңк·ёмқё мІҳлҰ¬ лЎңм§Ғ
        function mockSocialLogin(provider) {
            alert(`${provider} кі„м •мңјлЎң м•Ҳм „н•ҳкІҢ лЎңк·ёмқёлҗҳм—ҲмҠөлӢҲлӢӨ!`);
            processLoginSuccess();
        }
