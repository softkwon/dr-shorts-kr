<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Dr. SHORTS KR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" integrity="sha384-l+xbElFSnPZ2rOaGxg++yGpe/qwend44bCEuELQzE7t0iXmCsa1MGMwI1H6D9wB2" crossorigin="anonymous"></script>
    <script src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js" charset="utf-8"></script>
</head>
<body class="flex flex-col min-h-screen relative bg-gray-50">

    <div id="header-placeholder"></div>

    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
            <h2 class="text-2xl font-bold text-center mb-8 text-gray-800">로그인 / 회원가입</h2>

            <div class="space-y-3 mb-8">
                <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center border border-gray-300 py-3 rounded-xl hover:bg-gray-50 transition font-medium text-gray-700">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" class="w-5 h-5 mr-3"> 구글로 시작하기
                </button>
                <button onclick="loginWithKakao()" class="w-full flex items-center justify-center bg-[#FEE500] text-[#000000] py-3 rounded-xl hover:bg-[#F4DC00] transition font-medium">
                    <svg class="w-5 h-5 mr-3" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 4.64c-6.96 0-12.64 4.48-12.64 10.08 0 3.52 2.32 6.64 5.76 8.48l-1.44 5.44c-.16.48.32.8.72.56l6.32-4.24c.4.08.8.08 1.28.08 6.96 0 12.64-4.48 12.64-10.08S22.96 4.64 16 4.64z" fill="#000000"/>
                    </svg> 카카오로 시작하기
                </button>
                <button onclick="loginWithNaver()" class="w-full flex items-center justify-center bg-[#03C75A] text-white py-3 rounded-xl hover:bg-[#02b350] transition font-medium" id="naverIdLogin_loginButton">
                    <svg class="w-5 h-5 mr-3" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21.16 22.8H15.6l-5.4-8.12v8.12H5V9.2h5.56l5.4 8.16V9.2h5.2v13.6z" fill="#FFFFFF"/>
                    </svg> 네이버로 시작하기
                </button>
                <div id="naverIdLogin" style="display: none;"></div>
            </div>

            <div class="relative flex py-5 items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-sm">또는 이메일로 로그인</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <form class="space-y-4" onsubmit="handleEmailLogin(event)">
                <input type="email" placeholder="이메일 주소" class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 transition" required>
                <input type="password" placeholder="비밀번호" class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 transition" required>
                <button type="submit" class="w-full theme-bg text-white py-3 rounded-xl font-bold text-lg shadow-md theme-hover transition active:scale-95">
                    로그인
                </button>
            </form>

            <div class="mt-4 text-center">
                <p class="text-sm text-gray-500">아직 계정이 없으신가요?</p>
                <button onclick="location.href='register.html'" class="w-full mt-2 border-2 border-orange-500 text-orange-500 py-3 rounded-xl font-bold text-lg hover:bg-orange-50 transition active:scale-95">
                    이메일로 회원가입
                </button>
            </div>
            
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="app.js"></script>
    <script>
        // 공통 로그인 성공 처리 함수
        function processLoginSuccess() {
            localStorage.setItem('isLoggedIn', 'true');
            location.href = 'dashboard.html';
        }

        // 이메일 로그인 폼 제출 처리
        function handleEmailLogin(event) {
            event.preventDefault();
            processLoginSuccess();
        }

        // ==========================================
        // 소셜 로그인 연동 스크립트 설정부
        // ==========================================

        // [구글 로그인 설정]
        let googleClient;
        window.addEventListener('load', () => {
            googleClient = google.accounts.oauth2.initTokenClient({
                client_id: 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com', // 🔑 구글 클라이언트 ID 입력 필요
                scope: 'email profile',
                callback: (tokenResponse) => {
                    console.log("구글 로그인 성공!");
                    processLoginSuccess(); // 성공 시 대시보드 이동
                },
            });
        });

        function loginWithGoogle() {
            googleClient.requestAccessToken();
        }

        // [카카오 로그인 설정]
        Kakao.init('YOUR_KAKAO_JAVASCRIPT_KEY'); // 🔑 카카오 디벨로퍼스 JS 키 입력 필요

        function loginWithKakao() {
            Kakao.Auth.login({
                success: function(authObj) {
                    console.log("카카오 로그인 성공!");
                    processLoginSuccess(); // 성공 시 대시보드 이동
                },
                fail: function(err) {
                    console.error("카카오 로그인 실패:", err);
                    alert("카카오 로그인 키를 설정해주세요.");
                }
            });
        }

        // [네이버 로그인 설정]
        const naverLogin = new naver_id_login("YOUR_NAVER_CLIENT_ID", "http://127.0.0.1:5500/dashboard.html"); // 🔑 네이버 Client ID 입력
        const state = naverLogin.getUniqState();
        naverLogin.setButton("white", 2, 40);
        naverLogin.setDomain("http://127.0.0.1:5500");
        naverLogin.setState(state);
        naverLogin.init_naver_id_login();

        function loginWithNaver() {
            document.querySelector('#naverIdLogin a').click();
        }
    </script>
</body>
</html>
