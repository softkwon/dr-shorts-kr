<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Dr. SHORTS KR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col min-h-screen relative bg-gray-50">

    <div id="header-placeholder"></div>

    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
            <h2 class="text-2xl font-bold text-center mb-2 text-gray-800">이메일 회원가입</h2>
            <p class="text-center text-sm text-gray-500 mb-8">가입 1/2단계: 로그인 계정을 생성합니다.</p>

            <form class="space-y-4" onsubmit="event.preventDefault(); location.href='signup.html';">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">이메일</label>
                    <input type="email" placeholder="example@hospital.com" class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 transition" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">비밀번호</label>
                    <input type="password" placeholder="8자리 이상 영문, 숫자 조합" class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 transition" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">비밀번호 확인</label>
                    <input type="password" placeholder="비밀번호를 한번 더 입력해주세요" class="w-full border border-gray-300 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 transition" required>
                </div>
                
                <button type="submit" class="w-full theme-bg text-white py-3 rounded-xl font-bold text-lg shadow-md theme-hover transition active:scale-95 mt-4">
                    다음 단계 (병원 정보 입력)
                </button>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { loadComponent } from './ui.js';
        import { checkLoginState } from './auth.js';

        window.addEventListener('DOMContentLoaded', () => {
            // 헤더 로딩 후 이름 변경(checkLoginState)이 실행되도록 순서 보장
            loadComponent('header-placeholder', 'header.html', () => {
                checkLoginState(); 
            });
            loadComponent('footer-placeholder', 'footer.html');
        });
    </script>
    
    <script src="app.js"></script>
</body>
</html>
