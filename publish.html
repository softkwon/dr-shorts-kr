<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원클릭 송출 - Dr. SHORTS KR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <div id="header-placeholder"></div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-3xl bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-center mb-2 italic tracking-tighter">One-Click Publishing</h2>
            <p class="text-center text-gray-500 text-sm mb-10">플랫폼을 선택하면 영상 다운로드와 동시에 업로드 페이지로 연결됩니다.</p>

            <div class="mb-10 p-4 bg-gray-50 rounded-2xl border border-gray-100 flex items-center">
                <div class="w-16 h-16 bg-orange-100 rounded-xl flex items-center justify-center text-2xl mr-4" id="content-icon">🎬</div>
                <div class="flex-grow overflow-hidden">
                    <p class="text-[10px] font-bold text-orange-500" id="content-type">YOUTUBE SHORTS</p>
                    <h4 class="font-bold text-gray-800 truncate" id="content-title">콘텐츠 로딩 중...</h4>
                </div>
                <div class="flex flex-col gap-2">
                    <button onclick="copyAll()" class="shrink-0 text-[10px] font-bold text-blue-500 border border-blue-200 px-2 py-1 rounded-lg hover:bg-blue-50">본문 복사</button>
                    <button id="directDownloadBtn" class="shrink-0 text-[10px] font-bold text-orange-500 border border-orange-200 px-2 py-1 rounded-lg hover:bg-orange-50">영상 소장</button>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <button onclick="publishToPlatform('youtube')" class="group flex flex-col items-center p-5 border-2 border-gray-50 rounded-2xl hover:border-red-500 hover:bg-red-50 transition">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" class="w-10 h-10 object-contain mb-3" alt="YouTube">
                    <span class="text-xs font-bold text-gray-700">쇼츠 업로드</span>
                </button>
                <button onclick="publishToPlatform('instagram')" class="group flex flex-col items-center p-5 border-2 border-gray-50 rounded-2xl hover:border-pink-500 hover:bg-pink-50 transition">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" class="w-10 h-10 object-contain mb-3" alt="Instagram">
                    <span class="text-xs font-bold text-gray-700">릴스/게시물</span>
                </button>
                <button onclick="publishToPlatform('naver')" class="group flex flex-col items-center p-5 border-2 border-gray-50 rounded-2xl hover:border-green-500 hover:bg-green-50 transition">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Naver_App_Logo.png" class="w-10 h-10 object-contain mb-3" alt="Naver">
                    <span class="text-xs font-bold text-gray-700">블로그/클립</span>
                </button>
                <button onclick="publishToPlatform('facebook')" class="group flex flex-col items-center p-5 border-2 border-gray-50 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" class="w-10 h-10 object-contain mb-3" alt="Facebook">
                    <span class="text-xs font-bold text-gray-700">피드 게시</span>
                </button>
            </div>

            <div class="bg-orange-50 p-6 rounded-2xl border border-orange-100 mb-8">
                <h5 class="text-xs font-bold text-orange-800 mb-2 flex items-center">
                    <span class="mr-2">🚀</span> 원클릭 송출 프로세스
                </h5>
                <ul class="text-[11px] text-orange-700 space-y-2 leading-relaxed">
                    <li>1. 플랫폼 버튼 클릭 시 영상이 기기에 자동 저장됩니다.</li>
                    <li>2. 동시에 게시글 본문이 복사되며 해당 앱/웹으로 이동합니다.</li>
                    <li>3. 이동한 화면에서 방금 저장된 영상을 선택하고 본문을 '붙여넣기' 하세요.</li>
                </ul>
            </div>

            <div class="flex gap-3">
                <button onclick="location.href='library.html'" class="flex-grow bg-gray-100 text-gray-600 py-4 rounded-xl font-bold">서재로 이동</button>
                <button onclick="location.href='dashboard.html'" class="flex-grow bg-gray-800 text-white py-4 rounded-xl font-bold">대시보드</button>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { downloadVideo } from './api.js';
        import { loadComponent } from './ui.js';
        import { checkLoginState } from './auth.js';

        let currentVideoUrl = "";
        let currentFullText = "";

        // 데이터 로드
        window.addEventListener('DOMContentLoaded', () => {
            const contentId = localStorage.getItem('currentContentId');
            const myContents = JSON.parse(localStorage.getItem('myContents') || '[]');
            const data = myContents.find(c => c.id == contentId);

            if (data) {
                // 💡 [핵심] LocalStorage에 주소가 없으면 임시 보관소에서 가져옵니다.
                currentVideoUrl = data.videoUrl || sessionStorage.getItem('tempVideoData') || "";
                currentFullText = data.fullText || "내용이 없습니다.";
                
                document.getElementById('content-title').innerText = data.keywords || '진료 안내 콘텐츠';
                document.getElementById('content-type').innerText = data.type === 'video' ? 'YOUTUBE SHORTS' : 'SNS POST';
                document.getElementById('content-icon').innerText = data.type === 'video' ? '🎬' : '📝';
            }

            // 컴포넌트 로드
            loadComponent('header-placeholder', 'header.html', () => {
                checkLoginState(); 
            });
            loadComponent('footer-placeholder', 'footer.html');
        });

        // 본문 복사 함수
        window.copyAll = () => {
            navigator.clipboard.writeText(currentFullText);
            alert("본문이 복사되었습니다!");
        };

        // 영상 개별 다운로드
        document.getElementById('directDownloadBtn').addEventListener('click', () => {
            if(!currentVideoUrl) return alert("영상 주소가 없습니다.");
            downloadVideo(currentVideoUrl, "Dr_Shorts_Video.mp4");
        });

        // 플랫폼 송출 통합 함수
        window.publishToPlatform = async (platform) => {
            // 1. 영상 다운로드 실행
            if (currentVideoUrl) {
                downloadVideo(currentVideoUrl, `Dr_Shorts_${platform}.mp4`);
            }

            // 2. 본문 복사
            copyAll();
            
            // 3. 플랫폼별 딥링크 설정
            let url = "";
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

            switch(platform) {
                case 'youtube':
                    url = isMobile ? "vnd.youtube://upload" : "https://www.youtube.com/upload";
                    break;
                case 'instagram':
                    url = isMobile ? "instagram://camera" : "https://www.instagram.com/";
                    break;
                case 'naver':
                    // 네이버는 블로그 글쓰기 페이지로 연결
                    url = "https://blog.naver.com/PostWriteForm.naver";
                    break;
                case 'facebook':
                    url = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(window.location.origin);
                    break;
            }
            
            // 다운로드 시작 후 약간의 지연시간을 두고 페이지 이동
            setTimeout(() => {
                window.open(url, '_blank');
            }, 1000);
        };
    </script>
</body>
</html>
