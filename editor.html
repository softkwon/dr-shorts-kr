<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최종 편집 및 송출 - Dr. SHORTS KR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen relative bg-gray-50">

    <div id="header-placeholder"></div>

    <main class="flex-grow pt-6 pb-24 px-4">
        <div class="responsive-container max-w-6xl">
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <div class="lg:col-span-5">
                    <div id="preview-container" class="sticky top-24">
                        <div id="video-preview-box" class="hidden">
                            <h3 class="text-sm font-bold text-gray-500 mb-3 flex items-center">🎬 AI 생성 영상 미리보기</h3>
                            <div class="bg-black rounded-3xl overflow-hidden shadow-2xl aspect-[9/16] relative">
                                <div id="video-loading" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 z-10">
                                    <div class="w-12 h-12 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                    <p class="text-white text-xs font-medium pulse-orange">AI가 영상을 생성하고 있습니다...</p>
                                </div>
                                <video id="actual-video" class="w-full h-full object-cover hidden" controls>
                                    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                                </video>
                            </div>
                        </div>

                        <div id="sns-preview-box" class="hidden">
                            <h3 class="text-sm font-bold text-gray-500 mb-3 flex items-center">📝 SNS 포스팅 미리보기</h3>
                            <div class="bg-white rounded-2xl shadow-lg border border-gray-200 overflow-hidden">
                                <div class="p-4 border-b border-gray-100 flex items-center space-x-3">
                                    <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center">🏥</div>
                                    <div>
                                        <p class="text-sm font-bold">서울바른치과</p>
                                        <p class="text-[10px] text-gray-400">방금 전 · 공식 블로그</p>
                                    </div>
                                </div>
                                <div class="aspect-video bg-gray-100 flex items-center justify-center overflow-hidden">
                                    <img src="https://images.unsplash.com/photo-1629909613654-28e377c37b09?auto=format&fit=crop&q=80&w=500" alt="진료 이미지" class="w-full h-full object-cover">
                                </div>
                                <div class="p-5">
                                    <h4 id="preview-sns-title" class="font-bold text-lg mb-2 text-gray-800">임플란트 통증, 정말 걱정 마세요!</h4>
                                    <p id="preview-sns-body" class="text-sm text-gray-600 line-clamp-4 leading-relaxed">
                                        AI가 작성한 본문 내용이 이곳에 블로그 포스팅 형태로 표시됩니다...
                                    </p>
                                    <div class="mt-4 flex flex-wrap gap-2">
                                        <span class="text-blue-500 text-xs font-medium">#임플란트</span>
                                        <span class="text-blue-500 text-xs font-medium">#치과추천</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-7 space-y-6">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h3 id="editor-label" class="font-bold text-gray-800">✍️ 수정보완</h3>
                            <button onclick="copyContent()" class="text-xs theme-text font-bold border theme-border px-3 py-1.5 rounded-lg hover:bg-orange-50 transition">전체 복사</button>
                        </div>
                        <textarea id="main-editor" oninput="syncPreview()" class="w-full h-64 p-5 bg-gray-50 border border-gray-200 rounded-2xl text-sm leading-relaxed focus:ring-2 focus:ring-orange-500 outline-none transition resize-none">
                        </textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                            <h4 class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-widest">SNS 업로드 치트키</h4>
                            <div id="hashtag-list" class="flex flex-wrap gap-2 mb-4"></div>
                            <p class="text-[11px] text-gray-500 font-medium">📍 추천 제목: <span id="rec-title" class="text-gray-800"></span></p>
                        </div>
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 text-center">
                            <h4 class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-widest">원클릭 송출</h4>
                            <div class="flex justify-center space-x-4">
                                <button class="w-10 h-10 bg-red-50 text-xl rounded-full">📺</button>
                                <button class="w-10 h-10 bg-pink-50 text-xl rounded-full">📸</button>
                                <button class="w-10 h-10 bg-green-50 text-xl rounded-full">💚</button>
                            </div>
                            <p class="text-[9px] text-gray-400 mt-3">클릭 시 자동 연동 및 복사</p>
                        </div>
                    </div>

                    <button onclick="openFinalScan()" class="w-full theme-bg text-white py-4 rounded-2xl font-bold text-lg shadow-xl theme-hover transition active:scale-95">
                        발행 완료 (최종 의료법 검증)
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="final-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
            <div id="final-loading">
                <div class="w-16 h-16 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                <h3 class="text-xl font-bold mb-2">최종 의료법 스캐닝 중...</h3>
                <p class="text-gray-500 text-sm">금지어 및 과장표현을 마지막으로 점검합니다.</p>
            </div>
            <div id="final-result" class="hidden">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">🛡️</div>
                <h3 class="text-xl font-bold mb-2">의료 광고 심의 준수 완료</h3>
                <p class="text-gray-500 text-sm mb-6">인증마크가 부여되었습니다.</p>
                <button onclick="location.href='dashboard.html'" class="w-full theme-bg text-white py-3 rounded-xl font-bold">대시보드 이동</button>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="app.js"></script>
        
    <script type="module">
        import { loadComponent } from './ui.js';
        import { checkLoginState } from './auth.js';
        import { createAiVideo } from './api.js';
        import { finalizeContent } from './storage.js';

        window.addEventListener('DOMContentLoaded', async () => {
            // 1. 공통 UI 로딩
            loadComponent('header-placeholder', 'header.html', checkLoginState);
            loadComponent('footer-placeholder', 'footer.html');

            // 2. 데이터 불러오기
            const temp = JSON.parse(localStorage.getItem('tempContent'));
            if (!temp) {
                alert("콘텐츠 데이터가 없습니다. 다시 시작해주세요.");
                location.href = 'create.html';
                return;
            }

            const vBox = document.getElementById('video-preview-box');
            const sBox = document.getElementById('sns-preview-box');
            const editor = document.getElementById('main-editor');
            const recTitle = document.getElementById('rec-title');

            // 3. AI가 생성한 대본을 에디터에 배치 (scan.html에서 넘어온 데이터)
            if (temp.aiScript) {
                editor.value = temp.aiScript;
            }

            // 4. 유형별(Video vs SNS) 레이아웃 처리
            if (temp.type === 'video') {
                vBox.classList.remove('hidden');
                recTitle.innerText = `${temp.keywords} 관련 추천 쇼츠 제목`;
                
                // 영상 생성 시뮬레이션 호출 (api.js 연동)
                const result = await createAiVideo(temp.aiScript || temp.keywords);
                document.getElementById('video-loading').classList.add('hidden');
                const videoTag = document.getElementById('actual-video');
                videoTag.src = result.videoUrl;
                videoTag.classList.remove('hidden');
                
                // 임시 데이터 업데이트
                temp.videoUrl = result.videoUrl;
                localStorage.setItem('tempContent', JSON.stringify(temp));

            } else {
                sBox.classList.remove('hidden');
                document.getElementById('editor-label').innerText = "✍️ SNS 본문 편집";
                recTitle.innerText = `${temp.keywords} 관련 블로그 추천 제목`;
                syncPreview(); // 첫 렌더링 시 프리뷰 동기화
            }
        });

        // [전역 함수] 에디터 수정 시 SNS 프리뷰 실시간 동기화
        window.syncPreview = function() {
            const content = document.getElementById('main-editor').value;
            const previewBody = document.getElementById('preview-sns-body');
            if (previewBody) previewBody.innerText = content;
        };

        // [전역 함수] 텍스트 전체 복사
        window.copyContent = function() {
            const editor = document.getElementById('main-editor');
            editor.select();
            navigator.clipboard.writeText(editor.value);
            alert('클립보드에 본문이 복사되었습니다!');
        };

        // [전역 함수] 최종 발행 모달 및 송출 이동
        window.openFinalScan = function() {
            const modal = document.getElementById('final-modal');
            const loading = document.getElementById('final-loading');
            const result = document.getElementById('final-result');
            
            modal.classList.remove('hidden');

            // 최종 의료법 재검증 시뮬레이션
            setTimeout(() => {
                loading.classList.add('hidden');
                result.classList.remove('hidden');
                
                // 최종 결과 UI 셋팅
                result.innerHTML = `
                    <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">🛡️</div>
                    <h3 class="text-xl font-bold mb-2">의료 광고 심의 준수 완료</h3>
                    <p class="text-gray-500 text-sm mb-6">수정된 본문이 의료법 가이드라인을 통과했습니다.</p>
                    <button onclick="saveAndGoPublish()" class="w-full theme-bg text-white py-4 rounded-xl font-bold shadow-lg theme-hover transition">
                        🚀 원클릭 송출하기
                    </button>
                `;
            }, 2500);
        };

        // [전역 함수] 데이터 최종 저장 후 송출 페이지로 이동
        window.saveAndGoPublish = function() {
            try {
                const contentId = Date.now();
                const myContents = JSON.parse(localStorage.getItem('myContents') || '[]');
                
                // 1. 가벼운 텍스트 정보만 LocalStorage에 저장 (영구 보관용)
                const newContent = {
                    id: contentId,
                    keywords: document.getElementById('content-title')?.innerText || '병원 홍보 영상',
                    type: 'video',
                    date: new Date().toLocaleDateString(),
                    fullText: document.querySelector('.prose')?.innerText || "" 
                };
                myContents.push(newContent);
                localStorage.setItem('myContents', JSON.stringify(myContents));
                localStorage.setItem('currentContentId', contentId);

                // 2. 💡 [핵심] 무거운 영상 데이터는 SessionStorage에 임시 저장 (발행용)
                // currentVideoUrl 변수에 담긴 Base64 데이터를 넣습니다.
                if (typeof currentVideoUrl !== 'undefined' && currentVideoUrl) {
                    sessionStorage.setItem('tempVideoData', currentVideoUrl);
                }
                
                location.href = 'publish.html';
                
            } catch (e) {
                console.error("저장 실패:", e);
                if (e.name === 'QuotaExceededError') {
                    localStorage.removeItem('myContents');
                    alert("저장소 정리 후 다시 시도합니다.");
                }
            }
        };
    </script>
</body>
</html>
