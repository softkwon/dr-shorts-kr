<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 - Dr. SHORTS KR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <div id="header-placeholder"></div>

    <main class="flex-grow max-w-6xl w-full mx-auto p-6 space-y-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white rounded-3xl shadow-sm border border-gray-100 p-8">
            <div>
                <h2 class="text-2xl font-black text-gray-800 mb-2">환영합니다, <span id="dashUserName" class="text-orange-500">영석</span>님! 👋</h2>
                <p class="text-gray-500 text-sm">현재 <span class="font-bold text-gray-700">Pro 요금제</span>를 이용 중이시며, 이번 달 <span class="font-bold text-orange-500">10회</span>의 영상 생성이 남았습니다.</p>
            </div>
            <div class="mt-4 md:mt-0 flex gap-3 w-full md:w-auto">
                <button onclick="location.href='create.html?type=video'" class="flex-grow bg-gray-800 text-white font-bold py-3 px-6 rounded-xl hover:bg-gray-700 transition shadow-md">🎬 영상 생성</button>
                <button onclick="location.href='create.html?type=sns'" class="flex-grow bg-orange-500 text-white font-bold py-3 px-6 rounded-xl hover:bg-orange-600 transition shadow-md">📝 SNS 글 생성</button>
            </div>
        </div>

        <div>
            <h3 class="font-bold text-gray-800 mb-4 flex items-center"><span class="text-xl mr-2">📊</span> 나의 성과 분석 리포트</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-center">
                    <p class="text-xs font-bold text-gray-500 mb-1">이번 달 생성 콘텐츠</p>
                    <h4 class="text-2xl font-black text-gray-800">12<span class="text-sm font-normal text-gray-400 ml-1">건</span></h4>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-center">
                    <p class="text-xs font-bold text-gray-500 mb-1">송출 완료 채널</p>
                    <h4 class="text-2xl font-black text-gray-800">3<span class="text-sm font-normal text-gray-400 ml-1">곳</span></h4>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-center">
                    <p class="text-xs font-bold text-gray-500 mb-1">누적 예상 도달률</p>
                    <h4 class="text-2xl font-black text-blue-500">15.2<span class="text-sm font-normal text-gray-400 ml-1">K</span></h4>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-center">
                    <p class="text-xs font-bold text-gray-500 mb-1">전월 대비 성장률</p>
                    <h4 class="text-2xl font-black text-red-500">▲ 24<span class="text-sm font-normal text-gray-400 ml-1">%</span></h4>
                </div>
            </div>
        </div>

        <div>
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-gray-800 flex items-center"><span class="text-xl mr-2">🗂️</span> 최근 내가 만든 콘텐츠</h3>
                <a href="library.html" class="text-xs font-bold text-gray-400 hover:text-orange-500 transition">전체 서재 보기 +</a>
            </div>
            <div id="dashboard-my-contents" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-gray-800 flex items-center"><span class="text-xl mr-2">🔥</span> 이번 주 병의원 핫 키워드</h3>
                </div>
                <div class="relative h-64"><canvas id="keywordChart"></canvas></div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-gray-800 flex items-center"><span class="text-xl mr-2">📺</span> 숏폼 채널별 트래픽 점유율</h3>
                </div>
                <div class="relative h-64 flex justify-center"><canvas id="channelChart"></canvas></div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-10">
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
                <h3 class="font-bold text-gray-800 mb-6 flex items-center"><span class="text-xl mr-2">🏆</span> 시장 인기 콘텐츠 레퍼런스</h3>
                <div id="dashboard-popular-contents" class="space-y-4">
                    </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-gray-800 flex items-center"><span class="text-xl mr-2">📢</span> Dr. SHORTS 새로운 소식</h3>
                    <a href="#" class="text-xs font-bold text-gray-400 hover:text-orange-500 transition">더보기 +</a>
                </div>
                <div id="dashboard-news-list" class="space-y-4">
                    </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { loadComponent } from './ui.js';
        import { checkLoginState, startLogoutTimer } from './auth.js';

        window.addEventListener('DOMContentLoaded', () => {
            loadComponent('header-placeholder', 'header.html', () => { checkLoginState(); startLogoutTimer(); });
            loadComponent('footer-placeholder', 'footer.html');

            loadMyContents();
            loadAdminNews();  
            
            // 💡 관리자 통계 데이터 불러와서 렌더링 시작
            const stats = getDashboardStats();
            loadPopularContents(stats.popularContents);
            drawCharts(stats);
        });

        // 로컬스토리지에서 통계 데이터 가져오기 (없으면 기본값)
        function getDashboardStats() {
            const defaultStats = {
                hotKeywords: [{name: '#임플란트', val: 85}, {name: '#치아교정', val: 62}, {name: '#투명교정', val: 45}, {name: '#라미네이트', val: 38}, {name: '#사랑니', val: 20}],
                hotChannels: [{name: 'YouTube Shorts', val: 55}, {name: 'Instagram Reels', val: 30}, {name: 'Naver Clip', val: 15}],
                popularContents: [
                    {title: '"원장님 등판! 교정기 빼는 날 브이로그"', desc: '조회수 125만회 · 유튜브 쇼츠', link: 'https://youtube.com/shorts/v-p_kFkOYjY'},
                    {title: '"치아미백 하기 전 무조건 보세요 (1분 요약)"', desc: '조회수 89만회 · 인스타그램 릴스', link: 'https://youtube.com/shorts/0eU4VwTqNRo'},
                    {title: '"수면 임플란트, 진짜 하나도 안 아플까?"', desc: '조회수 56만회 · 유튜브 쇼츠', link: 'https://youtube.com/shorts/z63r5tgNAns'}
                ]
            };
            return JSON.parse(localStorage.getItem('sys_dashboard_stats')) || defaultStats;
        }

        // 💡 관리자가 입력한 인기 콘텐츠 3개 렌더링
        function loadPopularContents(contents) {
            const container = document.getElementById('dashboard-popular-contents');
            if(!container) return;

            container.innerHTML = contents.map((c, i) => {
                const colorClass = i === 0 ? 'text-orange-500' : 'text-gray-400';
                return `
                    <div onclick="window.open('${c.link}', '_blank')" class="flex items-center p-3 hover:bg-orange-50 rounded-xl transition cursor-pointer">
                        <span class="text-xl font-black ${colorClass} w-8 text-center">${i+1}</span>
                        <div class="ml-3 flex-grow">
                            <h4 class="text-sm font-bold text-gray-800">${c.title}</h4>
                            <p class="text-[10px] text-gray-500">${c.desc}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 💡 관리자가 입력한 데이터로 차트 그리기
        function drawCharts(stats) {
            // 1. 키워드 차트
            const kwLabels = stats.hotKeywords.map(k => k.name);
            const kwData = stats.hotKeywords.map(k => k.val);

            const ctxKeyword = document.getElementById('keywordChart').getContext('2d');
            new Chart(ctxKeyword, {
                type: 'bar',
                data: {
                    labels: kwLabels,
                    datasets: [{
                        label: '검색 및 사용량 지수',
                        data: kwData,
                        backgroundColor: 'rgba(249, 115, 22, 0.7)',
                        borderRadius: 6, borderWidth: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } }
                }
            });

            // 2. 채널 차트
            const chLabels = stats.hotChannels.map(c => c.name);
            const chData = stats.hotChannels.map(c => c.val);

            const ctxChannel = document.getElementById('channelChart').getContext('2d');
            new Chart(ctxChannel, {
                type: 'doughnut',
                data: {
                    labels: chLabels,
                    datasets: [{
                        data: chData,
                        backgroundColor: ['#ef4444', '#ec4899', '#22c55e'], // 유튜브, 인스타, 네이버 컬러유지
                        borderWidth: 2, hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '65%',
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }
                }
            });
        }

        // 내가 만든 콘텐츠 복원 (변경 없음)
        function loadMyContents() {
            const container = document.getElementById('dashboard-my-contents');
            const myContents = JSON.parse(localStorage.getItem('myContents')) || [];
            if (myContents.length === 0) {
                container.innerHTML = `<div class="col-span-3 bg-white p-8 rounded-3xl border border-gray-100 text-center text-gray-500 text-sm font-bold">아직 생성된 콘텐츠가 없습니다. 위 버튼을 눌러 첫 콘텐츠를 만들어보세요!</div>`;
                return;
            }
            const recentContents = myContents.slice(-3).reverse();
            container.innerHTML = recentContents.map(content => {
                const isVideo = content.type === 'video';
                return `
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 hover:border-orange-300 hover:shadow-md transition cursor-pointer flex flex-col justify-between" 
                         onclick="localStorage.setItem('currentContentId', '${content.id}'); location.href='publish.html';">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-3xl">${isVideo ? '🎬' : '📝'}</span>
                            <span class="text-[10px] font-bold text-gray-400 bg-gray-50 border border-gray-100 px-2 py-1 rounded-md">${content.date}</span>
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-800 text-sm mb-1 truncate">${content.keywords || '제목 없는 콘텐츠'}</h4>
                            <p class="text-xs text-gray-500 font-bold">${isVideo ? '숏폼 영상' : 'SNS 게시글'}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 관리자 소식 복원 (변경 없음)
        function loadAdminNews() {
            const container = document.getElementById('dashboard-news-list');
            const sysNews = JSON.parse(localStorage.getItem('sys_news')) || [];
            if (!container) return;
            if (sysNews.length === 0) { container.innerHTML = '<p class="text-sm text-gray-500 text-center py-4">등록된 새로운 소식이 없습니다.</p>'; return; }
            container.innerHTML = sysNews.slice(0, 4).map(news => {
                const badgeColor = news.type === '공지' ? 'bg-red-100 text-red-600' : news.type === '이벤트' ? 'bg-orange-100 text-orange-600' : 'bg-blue-100 text-blue-600';
                return `
                    <div class="flex justify-between items-center py-3 border-b border-gray-50 last:border-0 hover:bg-gray-50 transition px-2 rounded-lg cursor-pointer">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <span class="text-[10px] font-bold px-2 py-1 rounded-md shrink-0 ${badgeColor}">${news.type}</span>
                            <span class="text-sm text-gray-700 font-bold truncate">${news.title}</span>
                        </div>
                        <span class="text-xs text-gray-400 font-mono shrink-0 ml-4">${news.date}</span>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
