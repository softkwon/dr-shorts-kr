<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원정보 수정 - Dr. SHORTS KR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <div id="header-placeholder"></div>

    <main class="flex-grow max-w-2xl w-full mx-auto p-6 pb-20 mt-4">
        
        <div class="shadow-md rounded-3xl">
            <div class="bg-[#df7b3e] rounded-t-3xl p-8 text-white flex items-center gap-5">
                <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-3xl shadow-sm">
                    🏥
                </div>
                <div>
                    <h2 class="text-2xl font-black" id="bannerHospitalName">뉴욕바른치과</h2>
                    <p class="text-orange-50 mt-1"><span id="bannerManagerName">영석</span> 님, 반갑습니다!</p>
                </div>
            </div>

            <div class="bg-white rounded-b-3xl p-8 border-x border-b border-gray-100">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">병원명</label>
                        <input type="text" id="hospitalName" value="뉴욕바른치과" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-orange-500 focus:outline-none bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">담당자 (원장님 성함)</label>
                        <input type="text" id="managerName" value="영석" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-orange-500 focus:outline-none bg-white">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">병원 주소</label>
                    <input type="text" id="hospitalAddress" placeholder="상세 주소를 입력해주세요" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-orange-500 focus:outline-none bg-white">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">주요 진료과목</label>
                    <div class="flex flex-wrap gap-2" id="treatmentAreaContainer">
                        <button type="button" onclick="toggleBtn(this)" class="border border-gray-200 text-gray-600 px-4 py-2 rounded-full text-sm hover:bg-gray-50 transition">임플란트</button>
                        <button type="button" onclick="toggleBtn(this)" class="border border-gray-200 text-gray-600 px-4 py-2 rounded-full text-sm hover:bg-gray-50 transition">치아교정</button>
                        <button type="button" onclick="toggleBtn(this)" class="border border-gray-200 text-gray-600 px-4 py-2 rounded-full text-sm hover:bg-gray-50 transition">피부과/성형</button>
                        <button type="button" onclick="toggleBtn(this)" class="border border-gray-200 text-gray-600 px-4 py-2 rounded-full text-sm hover:bg-gray-50 transition">정형외과/도수</button>
                    </div>
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-bold text-gray-700 mb-2">선호하는 콘텐츠 스타일</label>
                    <div class="relative">
                        <select class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-orange-500 focus:outline-none bg-white appearance-none">
                            <option>신뢰도 중심 (나레이션형)</option>
                            <option>친근한 소통 (브이로그형)</option>
                            <option>정보 전달 (인포그래픽형)</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                            ▼
                        </div>
                    </div>
                </div>

                <div class="flex gap-4 mt-8">
                    <button onclick="location.href='dashboard.html'" class="w-1/3 bg-gray-100 text-gray-600 font-bold py-4 rounded-xl hover:bg-gray-200 transition text-sm">취소</button>
                    <button onclick="saveProfileInfo()" class="w-2/3 bg-[#df7b3e] text-white font-bold py-4 rounded-xl hover:bg-orange-600 transition shadow-md text-sm">정보 저장하기</button>
                </div>
            </div>
        </div>

        <div class="text-right mt-6">
            <button onclick="openAuthModal()" class="text-sm font-bold text-gray-400 hover:text-red-500 underline transition">
                회원 탈퇴하기
            </button>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <div id="authModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl transition-all transform translate-y-0">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-gray-800">본인 인증</h3>
                <button onclick="closeModals()" class="text-gray-400 hover:text-gray-800 text-xl font-bold">✕</button>
            </div>
            <p class="text-sm text-gray-500 mb-6">안전한 처리를 위해 비밀번호를 다시 한번 입력해 주세요.</p>
            <div class="mb-6">
                <input type="password" id="withdrawPassword" placeholder="비밀번호 입력" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:border-orange-500 focus:outline-none bg-gray-50">
            </div>
            <button onclick="verifyAuth()" class="w-full bg-[#df7b3e] text-white font-bold py-3 rounded-xl hover:bg-orange-600 transition shadow-lg">
                인증 완료
            </button>
        </div>
    </div>

    <div id="confirmWithdrawModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center">
            <div class="text-4xl mb-4">⚠️</div>
            <h3 class="text-xl font-black text-gray-800 mb-2">정말 탈퇴하시겠습니까?</h3>
            <p class="text-sm text-gray-500 mb-8">탈퇴 시 결제 내역을 포함한 모든 데이터와 생성된 콘텐츠가 삭제되며 복구할 수 없습니다.</p>
            
            <div class="flex gap-3">
                <button onclick="closeModals()" class="flex-1 bg-gray-100 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-200 transition">
                    No (취소)
                </button>
                <button onclick="executeWithdraw()" class="flex-1 bg-red-500 text-white font-bold py-3 rounded-xl hover:bg-red-600 transition shadow-lg">
                    Yes (탈퇴)
                </button>
            </div>
        </div>
    </div>

    <script>
        // 1. 페이지 로딩 시 기존 저장된 정보 불러오기
        window.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('managerName') || '영석';
            const savedHospital = localStorage.getItem('hospitalName') || '뉴욕바른치과';
            
            // 폼 입력칸 세팅
            document.getElementById('managerName').value = savedName;
            document.getElementById('hospitalName').value = savedHospital;
            
            // 배너 타이틀 세팅
            document.getElementById('bannerManagerName').innerText = savedName;
            document.getElementById('bannerHospitalName').innerText = savedHospital;
        });

        // 진료과목 버튼 토글 기능
        function toggleBtn(btn) {
            btn.classList.toggle('border-orange-500');
            btn.classList.toggle('bg-orange-50');
            btn.classList.toggle('text-orange-600');
        }

        // 💡 2. 정보 저장하기 함수 (헤더 연동)
        function saveProfileInfo() {
            const newName = document.getElementById('managerName').value.trim();
            const newHospital = document.getElementById('hospitalName').value.trim();
            
            if(!newName || !newHospital) return alert('병원명과 담당자명을 모두 입력해 주세요.');
            
            // 로컬스토리지에 저장하여 다른 페이지(헤더)에서도 쓸 수 있게 함
            localStorage.setItem('managerName', newName);
            localStorage.setItem('hospitalName', newHospital);
            
            alert('회원정보가 성공적으로 저장되었습니다.');
            
            // 헤더 및 현재 페이지 배너 강제 갱신
            location.reload();
        }

        // 3. 탈퇴 모달 제어
        const authModal = document.getElementById('authModal');
        const confirmWithdrawModal = document.getElementById('confirmWithdrawModal');

        function openAuthModal() {
            authModal.classList.remove('hidden');
            authModal.classList.add('flex');
            setTimeout(() => document.getElementById('withdrawPassword').focus(), 100);
        }

        function closeModals() {
            authModal.classList.add('hidden');
            authModal.classList.remove('flex');
            confirmWithdrawModal.classList.add('hidden');
            confirmWithdrawModal.classList.remove('flex');
            document.getElementById('withdrawPassword').value = ''; 
        }

        function verifyAuth() {
            const pw = document.getElementById('withdrawPassword').value;
            if(!pw) return alert('비밀번호를 입력해 주세요.');
            
            alert('본인 인증이 완료되었습니다.');
            authModal.classList.add('hidden');
            authModal.classList.remove('flex');
            confirmWithdrawModal.classList.remove('hidden');
            confirmWithdrawModal.classList.add('flex');
        }

        function executeWithdraw() {
            alert('처리가 완료되었습니다. 그동안 이용해 주셔서 감사합니다.');
            localStorage.clear(); 
            window.location.href = 'index.html';
        }
    </script>

    <script type="module">
        import { loadComponent } from './ui.js';
        import { checkLoginState, startLogoutTimer } from './auth.js';
        window.addEventListener('DOMContentLoaded', () => {
            loadComponent('header-placeholder', 'header.html', () => {
                checkLoginState();
                startLogoutTimer();
            });
            loadComponent('footer-placeholder', 'footer.html');
        });
    </script>
</body>
</html>
